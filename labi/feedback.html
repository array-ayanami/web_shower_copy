    <div class="container">
        <header class="main-header">
            <img src="C:\Users\8241574\Downloads\labi\image\meit_logo.jpg" alt="Logo" class="logo">
            <h1>Обратная связь</h1>
        </header>

        <section>
            <h2>Отправить сообщение</h2>
            <form id="feedbackForm">
                <label>
                    Ваше имя:
                    <input type="text" id="feedbackName" name="name" required>
                </label>

                <label>
                    Email:
                    <input type="email" id="feedbackEmail" name="email" required>
                </label>

                <label>
                    Тема:
                    <select id="feedbackSubject" name="subject" required>
                        <option value="">Выберите тему</option>
                        <option value="booking">Бронирование</option>
                        <option value="technical">Техническая проблема</option>
                        <option value="suggestion">Предложение</option>
                        <option value="other">Другое</option>
                    </select>
                </label>

                <label>
                    Сообщение:
                    <textarea id="feedbackMessage" name="message" rows="5" required></textarea>
                </label>

                <button type="submit">Отправить</button>
            </form>
            <div id="feedbackStatus"></div>
        </section>
    </div>
