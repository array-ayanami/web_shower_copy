<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | Общежитие</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="menu-btn">☰</div>
        <input type="checkbox" id="menu-toggle">
        <ul class="menu">
            <li><a href="index.html">Главная</a></li>
            <li><a href="booking.html">Забронировать</a></li>
            <li><a href="mybookings.html">Мои брони</a></li>
            <li><a href="info.html">Информация</a></li>
            <li><a href="feedback.html">Обратная связь</a></li>
        </ul>
        <div class="dropdown">
            <button class="dropbtn" id="profileBtn">Иванов Иван</button>
            <div class="dropdown-content" id="dropdownMenu">
                <a href="#" onclick="showProfile(); return false;">Профиль</a>
                <a href="#" onclick="logout(); return false;">Выйти</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="main-header">
            <img src="C:\Users\8241574\Downloads\labi\image\meit_logo.jpg" alt="Logo" class="logo">
            <h1>Регистрация нового пользователя</h1>
        </header>

        <section>
            <h2>Создайте свой аккаунт</h2>
            <!-- novalidate отключает стандартную валидацию браузера -->
            <form id="registerForm" novalidate>
                <label>
                    Имя:
                    <input type="text" id="name" name="name">
                </label>

                <label>
                    Email:
                    <!-- type="text" вместо email, чтобы браузер не проверял сам -->
                    <input type="text" id="email" name="email">
                </label>

                <label>
                    Пароль:
                    <input type="password" id="password" name="password">
                </label>

                <button type="submit">Зарегистрироваться</button>
            </form>
        </section>
    </div>

    <footer>
        <p>© 2026 Общежитие. Все права защищены.</p>
    </footer>
    
    <script src="email-validator.js"></script>

    <script src="scripts.js"></script>
</body>
</html>
