upstream auth      { server auth-service:8000; }
upstream booking   { server booking-service:8000; }
upstream comments  { server comments-service:8000; }
upstream feedback  { server feedback-service:8000; }

server {
    listen 80;
    client_max_body_size 10M;

    # ── Auth ──────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://auth;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Booking ───────────────────────────────────────────────
    location /booking/ {
        proxy_pass http://booking;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Comments SSE (без буферизации!) ───────────────────────
    location /comments/stream/ {
        proxy_pass http://comments;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_read_timeout          360s;
        proxy_http_version          1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding   on;
    }

    # ── Comments ──────────────────────────────────────────────
    location /comments/ {
        proxy_pass http://comments;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Feedback ──────────────────────────────────────────────
    location /feedback/ {
        proxy_pass http://feedback;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Главная страница → auth ────────────────────────────────
    location / {
        proxy_pass http://auth/auth/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
